name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "cpython-${{ matrix.python-version }}"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Add venv to PATH
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Build extension
        run: maturin develop

      - name: Core tests
        run: pytest tests/ --ignore=tests/test_yaml_suite.py -v

      - name: yaml-test-suite compliance
        run: pytest tests/test_yaml_suite.py -q --tb=short

  # ── Type checking ──────────────────────────────────────────────────────────
  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Build extension
        run: maturin develop

      - name: mypy
        run: mypy

  # ── Python lint ───────────────────────────────────────────────────────────
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

  # ── Rust lint ──────────────────────────────────────────────────────────────
  lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: rustfmt
        run: cargo fmt --check

  # ── Build release wheels ───────────────────────────────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, ruff, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python interpreters
        run: uv python install cpython-3.12 cpython-3.13 cpython-3.14

      - name: Find interpreter paths
        if: matrix.os != 'ubuntu-latest'
        id: interp
        shell: bash
        run: |
          P312=$(uv python find 3.12)
          P313=$(uv python find 3.13)
          P314=$(uv python find 3.14)
          echo "paths=$P312 $P313 $P314" >> $GITHUB_OUTPUT

      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter 3.12 3.13 3.14
          manylinux: auto
          rust-toolchain: nightly

      - name: Build wheels (macOS)
        if: matrix.os == 'macos-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release --out dist
            --interpreter ${{ steps.interp.outputs.paths }}
            --target universal2-apple-darwin
          rust-toolchain: nightly

      - name: Build wheels (Windows)
        if: matrix.os == 'windows-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release --out dist
            --interpreter ${{ steps.interp.outputs.paths }}
          rust-toolchain: nightly

      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
