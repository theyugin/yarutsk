name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Set up Python ${{ matrix.python-version }}
        id: python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev
        env:
          UV_PYTHON_PREFERENCE: only-system

      - name: Add venv to PATH
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi

      # pyo3-build-config does not emit rustc-link-search for the Python libs
      # dir on Windows with actions/setup-python. Set LIB explicitly so
      # link.exe can find python3xx.lib.
      - name: Add Python libs dir to LIB (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = & "${{ steps.python.outputs.python-path }}" -c "import sys; print(sys.base_prefix)"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$base\libs;$env:LIB"

      - name: Build extension
        run: maturin develop

      - name: Core tests
        run: pytest tests/ --ignore=tests/test_yaml_suite.py -v

      - name: yaml-test-suite compliance
        run: pytest tests/test_yaml_suite.py -q --tb=short

  # ── Type checking ──────────────────────────────────────────────────────────
  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev
        env:
          UV_PYTHON_PREFERENCE: only-system

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Build extension
        run: maturin develop

      - name: mypy
        run: mypy

  # ── Python lint ───────────────────────────────────────────────────────────
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev
        env:
          UV_PYTHON_PREFERENCE: only-system

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

  # ── Rust lint ──────────────────────────────────────────────────────────────
  lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: rustfmt
        run: cargo fmt --check

      - name: cargo test
        run: cargo test --no-fail-fast

  # ── cargo-deny (license + advisory audit) ────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  # ── sdist smoke build (every PR) ──────────────────────────────────────────
  sdist:
    name: sdist build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: List sdist
        run: ls -la dist/

  # ── Build release wheels ───────────────────────────────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.os }}, Python ${{ matrix.python-version }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, ruff, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Set up Python ${{ matrix.python-version }}
        id: python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      # Linux builds run inside a manylinux Docker container, so the host
      # python-path is not accessible; pass the version number instead.
      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter ${{ matrix.python-version }}
          manylinux: auto
          rust-toolchain: stable

      - name: Build wheels (macOS)
        if: matrix.os == 'macos-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release --out dist
            --interpreter ${{ steps.python.outputs.python-path }}
            --target universal2-apple-darwin
          rust-toolchain: stable

      - name: Build wheels (Windows)
        if: matrix.os == 'windows-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release --out dist
            --interpreter ${{ steps.python.outputs.python-path }}
          rust-toolchain: stable

      - name: Build sdist
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
