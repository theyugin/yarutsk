name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

env:
  PYTHON_VERSIONS: "3.12 3.13 3.14"

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Build extension
        run: uv run maturin develop

      - name: Core tests
        run: uv run pytest tests/ --ignore=tests/test_yaml_suite.py -v

      - name: yaml-test-suite compliance
        run: uv run pytest tests/test_yaml_suite.py -q --tb=short

  # ── Type checking ──────────────────────────────────────────────────────────
  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Build extension
        run: uv run maturin develop

      - name: mypy
        run: uv run mypy

  # ── Python lint ───────────────────────────────────────────────────────────
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

  # ── Rust lint ──────────────────────────────────────────────────────────────
  lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: rustfmt
        run: cargo fmt --check

  # ── Build release wheels ───────────────────────────────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, ruff, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Set up Python interpreters
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
            3.14

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release --out dist
            --interpreter ${{ env.PYTHON_VERSIONS }}
            ${{ matrix.os == 'macos-latest' && '--target universal2-apple-darwin' || '' }}
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'auto' || '' }}
          rust-toolchain: nightly

      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
