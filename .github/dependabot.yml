version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo-minor:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      pip-minor:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types: [minor, patch]
