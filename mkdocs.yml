site_name: yarutsk
site_description: A YAML round-trip library that preserves comments and insertion order
site_url: https://theyugin.github.io/yarutsk/
repo_url: https://github.com/theyugin/yarutsk
repo_name: theyugin/yarutsk
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - API: api.md
  - Library integrations: integrations.md
  - Round-trip fidelity: roundtrip.md
  - Error handling: errors.md
  - Thread safety: threading.md
  - Limitations: limitations.md
  - Changelog: changelog.md
  - Contributing: contributing.md
